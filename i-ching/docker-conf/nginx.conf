worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    # Security headers
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "0" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'" always;

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Cache static assets
        location ~* \.(css|js|woff2|png|jpg|svg|ico|webmanifest)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            # Re-declare security headers (nginx clears add_header in nested blocks)
            add_header X-Content-Type-Options    "nosniff" always;
            add_header X-Frame-Options           "DENY" always;
            add_header X-XSS-Protection          "0" always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'" always;
        }

        # Service worker — no caching
        location = /sw.js {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header X-Content-Type-Options    "nosniff" always;
            add_header X-Frame-Options           "DENY" always;
            add_header X-XSS-Protection          "0" always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'" always;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
