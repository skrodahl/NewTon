server {
    listen 2020;  # Port 2020 = "Double 20" (darts reference) 🎯
    server_name _;
    root /var/www/html;
    index landing-page.php tournament.php index.html index.htm;

    # Hide nginx version from attackers
    server_tokens off;

    # Security Headers (Defense-in-Depth Protection)
    # Prevents clickjacking attacks by disallowing embedding in foreign iframes
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevents MIME-type sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;

    # Controls referrer information leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disables unused browser features that NewTon doesn't need
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()" always;

    # Content Security Policy — strict by default, relaxed only where required
    # Landing page and doc pages have zero inline JS/styles — full CSP protection
    # Tournament app (tournament.php) requires 'unsafe-inline' due to 93+ inline event
    # handlers and 266+ inline styles — architectural requirement for offline operation
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # Allow large tournament file uploads (up to 10MB)
    client_max_body_size 10M;

    # Default location - serve static files
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html =404;
    }

    # Serve index.html for directories (needed for /chalker/ subfolder)
    location ~ ^(.+)/$ {
        try_files $1/index.html =404;
    }

    # Redirect /chalker to /chalker/ (add trailing slash for directory)
    # Uses relative redirect to work correctly behind reverse proxy
    location ~ ^/chalker$ {
        return 301 chalker/;
    }

    # Redirect /releases to /releases/ (add trailing slash for directory)
    location ~ ^/releases$ {
        return 301 releases/;
    }

    # Landing page — strict CSP (no unsafe-inline), exact match beats location ~ \.php$
    # Redirects to /tournament.php if NEWTON_LANDING_PAGE env var is not set
    location = /landing-page.php {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()" always;
    }

    # /tournament.html — internal rewrite to tournament.php, URL stays clean for Google indexing
    location = /tournament.html {
        rewrite ^ /tournament.php last;
    }

    # PHP handler for ALL .php files (REST API + tournament.php for Docker configuration)
    # tournament.php needs 'unsafe-inline' — overrides the strict server-level CSP
    # camera=(self) required for result QR scanning via BarcodeDetector/getUserMedia
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()" always;
    }

    # Chalker app — needs 'unsafe-inline' for inline styles and scripts
    # camera=(self) required for QR scanning via BarcodeDetector/getUserMedia
    location /chalker/ {
        try_files $uri $uri/index.html =404;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=()" always;
    }
}
